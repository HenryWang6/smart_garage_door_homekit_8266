name: Release

on:
  release:
     types: [published]

permissions:
  contents: write
  actions: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
            ref: main
            submodules: true

      - name: Tag
        id: tag
        uses: JinoArch/get-latest-tag@latest

      - name: Update version on manifest.json
        uses: amochkin/action-json@v1
        id: write_version
        with:
          mode: write
          file: docs/manifest.json
          property: version
          value: ${{ steps.tag.outputs.latestTag }}
          value_type: string
          
      - name: Output read value of 'version' property
        run: echo ${{ steps.write_version.outputs.value }}
        shell: bash

      - name: Update firmware path on manifest.json to relative
        uses: amochkin/action-json@v1
        id: builds_parts_path
        with:
          mode: write
          file: docs/manifest.json
          property: builds.0.parts.0.path
          value: firmware/HTGDO-${{ steps.tag.outputs.latestTag }}.bin
          value_type: string
          
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.platformio/.cache
          key: ${{ runner.os }}-pio
          
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install PlatformIO Core
        run: |
            python -m pip install --upgrade pip
            pip install --upgrade platformio

      - name: Build PlatformIO Project
        run: pio run -e ratgdo_esp8266_hV25

      - name : md5sum Firmware.bin
        run: |
          cd .pio/build/ratgdo_esp8266_hV25
          md5sum firmware.bin | awk '{print $1}' > firmware.md5

      - name: Rename Firmware Files
        run: |
          mv .pio/build/ratgdo_esp8266_hV25/firmware.bin .pio/build/ratgdo_esp8266_hV25/HTGDO-${{ steps.tag.outputs.latestTag }}.bin
          mv .pio/build/ratgdo_esp8266_hV25/firmware.elf .pio/build/ratgdo_esp8266_hV25/HTGDO-${{ steps.tag.outputs.latestTag }}.elf
          mv .pio/build/ratgdo_esp8266_hV25/firmware.md5 .pio/build/ratgdo_esp8266_hV25/HTGDO-${{ steps.tag.outputs.latestTag }}.md5

      - name: Copy firmware to docs for GitHub Pages
        run: |
          rm -rf docs/firmware
          mkdir -p docs/firmware
          cp .pio/build/ratgdo_esp8266_hV25/HTGDO-${{ steps.tag.outputs.latestTag }}.bin docs/firmware/

      - name: Attach Bundle - Firmware.bin
        uses: AButler/upload-release-assets@v3.0
        with:
          files: ".pio/build/ratgdo_esp8266_hV25/*.bin"
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          release-tag: ${{ steps.tag.outputs.latestTag }}
          
      - name: Attach Bundle - Firmware.md5
        uses: AButler/upload-release-assets@v3.0
        with:
          files: ".pio/build/ratgdo_esp8266_hV25/*.md5"
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          release-tag: ${{ steps.tag.outputs.latestTag }}
          
      - name: Attach Bundle - Firmware.elf
        uses: AButler/upload-release-assets@v3.0
        with:
          files: ".pio/build/ratgdo_esp8266_hV25/*.elf"
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          release-tag: ${{ steps.tag.outputs.latestTag }}

      - name: Commit manifest and firmware to repo
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update manifest and firmware for release ${{ steps.tag.outputs.latestTag }}"
          file_pattern: docs/manifest.json docs/firmware/

      - name: Attach manifest.json to Release
        uses: AButler/upload-release-assets@v3.0
        with:
          files: "docs/manifest.json"
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          release-tag: ${{ steps.tag.outputs.latestTag }}

